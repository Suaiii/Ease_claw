<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="elder.title">ClawEase Elder View</title>
  <style>
    :root {
      --bg: #fbf3e6;
      --ink: #191713;
      --muted: #645d52;
      --line: rgba(25, 23, 19, 0.12);
      --panel: rgba(255, 251, 244, 0.88);
      --accent: #c16339;
      --ok: #2f725d;
      --warn: #9b6a14;
      --shadow: 0 24px 60px rgba(69, 48, 26, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei UI", "Aptos", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(193, 99, 57, 0.16), transparent 24rem),
        linear-gradient(180deg, #fff9f0 0%, #f4ead8 100%);
      min-height: 100vh;
    }
    .shell { max-width: 780px; margin: 0 auto; padding: 24px 18px 28px; }
    .hero, .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
    }
    .hero { padding: 28px 24px; margin-bottom: 18px; text-align: center; position: relative; }
    .lang-switch {
      position: absolute; top: 18px; right: 18px;
      display: inline-flex; gap: 4px; padding: 4px;
      background: rgba(25, 23, 19, 0.06); border-radius: 999px;
    }
    .lang-switch button {
      border: 0; background: transparent; padding: 6px 12px; border-radius: 999px;
      cursor: pointer; font: inherit; font-size: 13px; color: var(--muted);
      transition: background .16s ease, color .16s ease, box-shadow .16s ease;
    }
    .lang-switch button.active {
      background: #fff; color: var(--ink); box-shadow: 0 1px 3px rgba(69, 48, 26, 0.12);
    }
    .eyebrow { display: inline-block; padding: 8px 14px; border-radius: 999px; background: rgba(25, 23, 19, 0.06); color: var(--muted); font-size: 14px; margin-bottom: 16px; }
    h1 { margin: 0 0 12px; font-family: Georgia, "STSong", serif; font-size: clamp(40px, 7vw, 62px); line-height: 1.02; }
    .lead { margin: 0 auto; max-width: 22em; color: var(--muted); font-size: 22px; line-height: 1.5; }
    .stage { display: grid; gap: 16px; }
    .card { padding: 22px; }
    .status { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .status-box { border: 1px solid var(--line); border-radius: 22px; padding: 14px; background: rgba(255,255,255,0.6); }
    .status-box .label { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .status-box .value { font-weight: 700; font-size: 20px; }
    .prompt { font-size: 28px; font-weight: 700; margin-bottom: 12px; text-align: center; }
    textarea {
      width: 100%; min-height: 132px; resize: vertical; font: inherit; font-size: 26px; line-height: 1.6;
      padding: 18px 78px 18px 22px; border-radius: 24px; border: 2px solid rgba(25, 23, 19, 0.08);
      background: rgba(255,255,255,0.82); color: var(--ink);
    }
    .voice-wrap { position: relative; }
    .mic-btn {
      position: absolute; right: 16px; bottom: 16px; width: 56px; height: 56px;
      border-radius: 50%; border: 2px solid rgba(25, 23, 19, 0.08);
      background: #fff; color: var(--accent); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 16px rgba(69, 48, 26, 0.16);
      transition: transform .16s ease, background .16s ease, color .16s ease, box-shadow .16s ease;
    }
    .mic-btn:hover { transform: translateY(-1px); }
    .mic-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .mic-btn.listening {
      background: var(--accent); color: #fff; border-color: transparent;
      animation: mic-pulse 1.2s infinite;
    }
    .mic-btn.error { background: #b53b3b; color: #fff; border-color: transparent; }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(193, 99, 57, 0.55); }
      50% { box-shadow: 0 0 0 14px rgba(193, 99, 57, 0); }
    }
    .mic-status {
      margin: 10px 4px 0; font-size: 16px; color: var(--muted);
      min-height: 22px; line-height: 1.5; text-align: center;
    }
    .mic-status.error { color: #b53b3b; }
    .readout-toggle {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      margin-top: 14px; padding: 14px 16px; border-radius: 22px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.66);
    }
    .readout-copy { display: grid; gap: 4px; }
    .readout-copy strong { font-size: 18px; }
    .readout-copy span { color: var(--muted); font-size: 15px; line-height: 1.5; }
    .switch {
      position: relative; width: 60px; height: 34px; display: inline-flex; flex: 0 0 auto;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; cursor: pointer; border-radius: 999px;
      background: rgba(25, 23, 19, 0.18); transition: background .16s ease;
    }
    .slider::before {
      content: ""; position: absolute; left: 4px; top: 4px; width: 26px; height: 26px;
      border-radius: 50%; background: #fff; box-shadow: 0 3px 10px rgba(69, 48, 26, 0.18);
      transition: transform .16s ease;
    }
    .switch input:checked + .slider { background: var(--ok); }
    .switch input:checked + .slider::before { transform: translateX(26px); }
    .presets { display: grid; gap: 12px; margin-top: 16px; }
    .preset {
      width: 100%; text-align: left; border: 0; border-radius: 24px; background: linear-gradient(135deg, #fffaf4, #f7ebde);
      color: var(--ink); padding: 20px 22px; font: inherit; cursor: pointer; box-shadow: inset 0 0 0 1px rgba(25, 23, 19, 0.08);
      transition: transform .16s ease, box-shadow .16s ease;
    }
    .preset:hover { transform: translateY(-1px); box-shadow: inset 0 0 0 1px rgba(193, 99, 57, 0.3); }
    .preset strong { display: block; font-size: 26px; margin-bottom: 6px; }
    .preset span { display: block; color: var(--muted); font-size: 18px; line-height: 1.45; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .btn {
      border: 0; border-radius: 24px; padding: 18px 20px; font: inherit; font-weight: 700; font-size: 24px;
      cursor: pointer; transition: transform .16s ease, opacity .16s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: .55; cursor: wait; transform: none; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #db7e55); color: white; }
    .btn-secondary { background: rgba(25, 23, 19, 0.08); color: var(--ink); }
    .big-result { text-align: center; display: grid; gap: 10px; }
    .big-result .state { font-size: 18px; color: var(--muted); }
    .big-result .headline { font-size: clamp(30px, 6vw, 48px); line-height: 1.18; font-weight: 800; }
    .big-result .detail { color: var(--muted); font-size: 22px; line-height: 1.55; }
    .hint { margin-top: 8px; text-align: center; color: var(--muted); font-size: 16px; }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    @media (max-width: 640px) {
      .shell { padding: 16px 12px 20px; }
      .hero, .card { padding: 18px; border-radius: 24px; }
      .lang-switch { top: 12px; right: 12px; }
      .status { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
      .preset strong, .btn { font-size: 22px; }
      textarea { font-size: 22px; }
      .lead { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="lang-switch" role="group" aria-label="Language">
        <button type="button" data-lang="zh" data-i18n="lang.zh">中文</button>
        <button type="button" data-lang="en" data-i18n="lang.en">EN</button>
      </div>
      <div class="eyebrow" data-i18n="elder.eyebrow">ClawEase 老人端</div>
      <h1 data-i18n="elder.h1">一句话就够了</h1>
      <p class="lead" data-i18n="elder.lead">说出你要做的事。系统会帮你打电话、发短信，或者读出最新短信。</p>
    </section>

    <section class="stage">
      <article class="card">
        <div class="status">
          <div class="status-box">
            <div class="label" data-i18n="elder.label.device">设备状态</div>
            <div class="value" id="deviceStatus">...</div>
          </div>
          <div class="status-box">
            <div class="label" data-i18n="elder.label.runtime">理解方式</div>
            <div class="value" id="runtimeStatus">...</div>
          </div>
          <div class="status-box">
            <div class="label" data-i18n="elder.label.model">Model</div>
            <div class="value" id="modelStatus" style="font-size:16px">...</div>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="prompt" data-i18n="elder.prompt">你想让我帮你做什么？</div>
        <div class="voice-wrap">
          <textarea
            id="voiceText"
            data-i18n-attr="placeholder:elder.placeholder"
            placeholder="例如：给10086打电话&#10;或者：有没有新短信"></textarea>
          <button type="button" id="micBtn" class="mic-btn"
            data-i18n-attr="title:elder.mic.title;aria-label:elder.mic.aria"
            title="按一下开始说话" aria-label="开始说话">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 14q-1.25 0-2.125-.875T9 11V5q0-1.25.875-2.125T12 2q1.25 0 2.125.875T15 5v6q0 1.25-.875 2.125T12 14Zm-1 7v-3.075q-2.6-.35-4.3-2.325T5 11h2q0 2.075 1.463 3.537T12 16q2.075 0 3.538-1.463T17 11h2q0 2.625-1.7 4.6T13 17.925V21h-2Z"/>
            </svg>
          </button>
        </div>
        <div class="mic-status" id="micStatus"></div>
        <div class="readout-toggle">
          <div class="readout-copy">
            <strong data-i18n="elder.readaloud.title">读短信给我听</strong>
            <span data-i18n="elder.readaloud.desc">开启后，读短信时会自动播报归纳结果。</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="readAloud" checked>
            <span class="slider" aria-hidden="true"></span>
          </label>
        </div>
        <div class="presets">
          <button class="preset" type="button"
            data-text-key="elder.preset.call.text"
            data-text="给10086打电话">
            <strong data-i18n="elder.preset.call.title">帮我打电话</strong>
            <span data-i18n="elder.preset.call.desc">例如：给10086打电话</span>
          </button>
          <button class="preset" type="button"
            data-text-key="elder.preset.sms.text"
            data-text="给12306发一条我晚点到">
            <strong data-i18n="elder.preset.sms.title">帮我发短信</strong>
            <span data-i18n="elder.preset.sms.desc">例如：给12306发一条"我晚点到"</span>
          </button>
          <button class="preset" type="button"
            data-text-key="elder.preset.inbox.text"
            data-text="有没有新短信">
            <strong data-i18n="elder.preset.inbox.title">帮我读短信</strong>
            <span data-i18n="elder.preset.inbox.desc">例如：有没有新短信</span>
          </button>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="runBtn" data-i18n="elder.btn.run">开始帮我</button>
          <button class="btn btn-secondary" id="clearBtn" data-i18n="elder.btn.clear">清空重来</button>
        </div>
        <div class="hint" data-i18n="elder.hint">建议演示时先从这里发起，再看右边开发者端和手机画面。</div>
      </article>

      <article class="card">
        <div class="big-result">
          <div class="state" id="runState" data-i18n="elder.state.idle">等待命令</div>
          <div class="headline" id="headline" data-i18n="elder.headline.intro">我会把你的话变成一个明确动作。</div>
          <div class="detail" id="detail" data-i18n="elder.detail.intro">点击上面的按钮，或者输入一句中文命令。</div>
        </div>
      </article>
    </section>
  </div>

    const el = {
      deviceStatus: document.getElementById('deviceStatus'),
      runtimeStatus: document.getElementById('runtimeStatus'),

    async function fetchJson(url, options) {
      const res = await fetch(url, options);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    function setBusy(busy, textKey) {
      el.runBtn.disabled = busy;
      el.clearBtn.disabled = busy;
      el.runState.dataset.i18n = textKey;
      el.runState.textContent = I18N.t(textKey);
    }

    function setText(node, key, vars) {
      node.dataset.i18n = key;
      if (vars) {
        node.dataset.i18nVars = JSON.stringify(vars);
        node.textContent = I18N.t(key, vars);
      } else {
        delete node.dataset.i18nVars;
        node.textContent = I18N.t(key);
      }
    }

    function renderStatus(data) {
      state.lastStatus = data;
      const ok = !!data.adb?.ok;
      el.deviceStatus.dataset.i18n = ok ? 'elder.device.connected' : 'elder.device.missing';
      el.deviceStatus.textContent = I18N.t(el.deviceStatus.dataset.i18n);
      el.deviceStatus.className = `value ${ok ? 'ok' : 'warn'}`;
      el.runtimeStatus.textContent = data.runtime || '-';
      el.modelStatus.textContent = data.model || '-';
    }

    function renderRun(data) {
      state.lastRun = data;
      const intent = data.intent || {};
      const result = data.result || {};
      if (data.clarificationRequired) {
        state.pendingClarification = data.pendingClarification?.context || null;
        setText(el.headline, 'elder.headline.clarify');
        delete el.detail.dataset.i18n;
        el.detail.textContent = data.pendingClarification?.question || intent.clarify_question || '';
        setBusy(false, 'elder.state.clarify');
        return;
      }
      state.pendingClarification = null;
      if (!data.ok) {
        setText(el.headline, 'elder.headline.fail');
        if (data.error) {
          delete el.detail.dataset.i18n;
          el.detail.textContent = data.error;
        } else {
          setText(el.detail, 'elder.detail.fail');
        }
        return;
      }
      if (intent.action === 'call') {
        setText(el.headline, 'elder.headline.call');
        if (result.detail) {
          delete el.detail.dataset.i18n;
          el.detail.textContent = result.detail;
        } else {
          setText(el.detail, 'elder.detail.call');
        }
      } else if (intent.action === 'send_sms') {
        setText(el.headline, 'elder.headline.sms');
        if (result.detail) {
          delete el.detail.dataset.i18n;
          el.detail.textContent = result.detail;
        } else {
          setText(el.detail, 'elder.detail.sms');
        }
      } else if (intent.action === 'read_inbox') {
        const items = result.payload || [];
        setText(el.headline, 'elder.headline.inbox', { n: items.length });
        if (data.elderSummary?.display) {
          delete el.detail.dataset.i18n;
          el.detail.textContent = data.elderSummary.display;
        } else if (items.length > 0) {
          const first = items[0];
          const sender = first.sender || I18N.t('elder.detail.inbox.unknown_sender');
          delete el.detail.dataset.i18n;
          el.detail.textContent = `${sender}：${first.readable || first.body || ''}`;
        } else if (result.detail) {
          delete el.detail.dataset.i18n;
          el.detail.textContent = result.detail;
        } else {
          setText(el.detail, 'elder.detail.inbox.empty');
        }
      } else {
        setText(el.headline, 'elder.headline.unknown');
        delete el.detail.dataset.i18n;
        el.detail.textContent = JSON.stringify(intent);
      }
    }

    async function refreshStatus() {
      try {
        const data = await fetchJson('/api/status');
        renderStatus(data);
      } catch {
        el.deviceStatus.dataset.i18n = 'elder.device.failed';
        el.deviceStatus.textContent = I18N.t('elder.device.failed');
        el.deviceStatus.className = 'value warn';
      }
    }

    async function runCommand() {
      const voiceText = el.voiceText.value.trim();
      if (!voiceText) {
        setText(el.headline, 'elder.headline.empty');
        setText(el.detail, 'elder.detail.empty');
        return;
      }
      setBusy(true, 'elder.state.busy');
      setText(el.headline, 'elder.headline.busy');
      setText(el.detail, 'elder.detail.busy');
      try {
        const data = await fetchJson('/api/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            voiceText,
            dryRun: false,
            autoSend: false,
            noTts: !el.readAloud.checked,
            limit: 5,
            clarificationContext: state.pendingClarification,
          }),
        });
        renderRun(data);
        if (!data.clarificationRequired) {
          setBusy(false, 'elder.state.done');
        }
        await refreshStatus();
      } catch (error) {
        setText(el.headline, 'elder.headline.error');
        delete el.detail.dataset.i18n;
        el.detail.textContent = error.message;
        setBusy(false, 'elder.state.error');
      }
    }

    document.querySelectorAll('[data-text]').forEach((button) => {
      button.addEventListener('click', () => {
        const key = button.dataset.textKey;
        if (key) {
          el.voiceText.value = I18N.t(key);
        } else {
          el.voiceText.value = button.dataset.text || '';
        }
      });
    });

    el.runBtn.addEventListener('click', runCommand);
    el.clearBtn.addEventListener('click', () => {
      state.pendingClarification = null;
      el.voiceText.value = '';
      setText(el.runState, 'elder.state.idle');
      setText(el.headline, 'elder.headline.cleared');
      setText(el.detail, 'elder.detail.cleared');
    });

    I18N.bindLangSwitch(document);
    I18N.applyStatic();
    I18N.onChange(() => {
      // 重渲染带变量的动态文本（status / run）+ 已变更属性
      if (state.lastStatus) renderStatus(state.lastStatus);
      if (state.lastRun) renderRun(state.lastRun);
      if (el.micStatus.dataset.i18n) {
        let vars;
        if (el.micStatus.dataset.i18nVars) {
          try { vars = JSON.parse(el.micStatus.dataset.i18nVars); } catch (_) {}
        }
        el.micStatus.textContent = I18N.t(el.micStatus.dataset.i18n, vars);
      }
      if (el.headline.dataset.i18n && el.headline.dataset.i18nVars) {
        try {
          const vars = JSON.parse(el.headline.dataset.i18nVars);
          el.headline.textContent = I18N.t(el.headline.dataset.i18n, vars);
        } catch (_) {}
      }
    });

    function initAsr() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        el.micBtn.disabled = true;
        el.micBtn.title = I18N.t('elder.mic.unsupported.title');
        el.micBtn.dataset.i18nAttr = 'title:elder.mic.unsupported.title';
        setText(el.micStatus, 'elder.mic.unsupported');
        el.micStatus.classList.add('error');
        return;
      }

      const recognition = new SR();
      recognition.lang = 'zh-CN';
      recognition.interimResults = true;
      recognition.continuous = false;
      recognition.maxAlternatives = 1;

      let listening = false;

      function setMicStatus(key, isError = false, vars) {
        el.micStatus.dataset.i18n = key;
        if (vars) {
          el.micStatus.dataset.i18nVars = JSON.stringify(vars);
        } else {
          delete el.micStatus.dataset.i18nVars;
        }
        el.micStatus.textContent = I18N.t(key, vars);
        el.micStatus.classList.toggle('error', isError);
      }

      recognition.onstart = () => {
        listening = true;
        el.micBtn.classList.remove('error');
        el.micBtn.classList.add('listening');
        el.micBtn.dataset.i18nAttr = 'title:elder.mic.titleStop';
        el.micBtn.title = I18N.t('elder.mic.titleStop');
        setMicStatus('elder.mic.listening');
      };

      recognition.onresult = (event) => {
        let text = '';
        for (const result of event.results) {
          text += result[0].transcript;
        }
        el.voiceText.value = text.trim();
      };

      recognition.onerror = (event) => {
        listening = false;
        el.micBtn.classList.remove('listening');
        el.micBtn.classList.add('error');
        const map = {
          'not-allowed': 'elder.mic.err.notAllowed',
          'no-speech': 'elder.mic.err.noSpeech',
          'audio-capture': 'elder.mic.err.audioCapture',
          'network': 'elder.mic.err.network',
          'aborted': 'elder.mic.err.aborted',
        };
        const key = map[event.error];
        if (key) {
          el.micStatus.dataset.i18n = key;
          delete el.micStatus.dataset.i18nVars;
          el.micStatus.textContent = I18N.t(key) + I18N.t('elder.mic.err.suffix');
        } else {
          delete el.micStatus.dataset.i18n;
          el.micStatus.textContent = (event.error || 'unknown') + I18N.t('elder.mic.err.suffix');
        }
        el.micStatus.classList.add('error');
      };

      recognition.onend = () => {
        listening = false;
        el.micBtn.classList.remove('listening');
        el.micBtn.dataset.i18nAttr = 'title:elder.mic.title;aria-label:elder.mic.aria';
        el.micBtn.title = I18N.t('elder.mic.title');
        if (!el.micStatus.classList.contains('error')) {
          setMicStatus(el.voiceText.value ? 'elder.mic.done' : 'elder.mic.empty');
        }
      };

      el.micBtn.addEventListener('click', () => {
        if (listening) {
          try { recognition.stop(); } catch (_) {}
          return;
        }
        el.micBtn.classList.remove('error');
        try {
          recognition.start();
        } catch (err) {
          el.micStatus.dataset.i18n = 'elder.mic.err.start';
          el.micStatus.dataset.i18nVars = JSON.stringify({ msg: err.message });
          el.micStatus.textContent = I18N.t('elder.mic.err.start', { msg: err.message });
          el.micStatus.classList.add('error');
        }
      });
    }

    initAsr();
    refreshStatus();
    setInterval(refreshStatus, 8000);
  </script>
</body>
</html>
